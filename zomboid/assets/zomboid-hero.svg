<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 980" role="img" aria-labelledby="title desc">
  <title id="title">Last Route Out</title>
  <desc id="desc">어두운 숲과 버려진 도로, 탈출 표지판을 표현한 생존 테마 일러스트</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#303a29"/>
      <stop offset="0.55" stop-color="#171d15"/>
      <stop offset="1" stop-color="#090b08"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#393a30"/>
      <stop offset="1" stop-color="#13140f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8ca62"/>
      <stop offset="1" stop-color="#727a35"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="9" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="grainAlpha"><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainAlpha" mode="screen"/>
    </filter>
  </defs>


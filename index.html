<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Choromi game server guides" />
  <title>Choromi Game Servers</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, Pretendard, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0d1117; color: #f0f3f6; }
    main { width: min(760px, calc(100% - 32px)); }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 7vw, 4.2rem); }
    p { margin: 0 0 28px; color: #9ca7b5; }
    .games { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    a { min-height: 190px; padding: 24px; border: 1px solid #30363d; border-radius: 18px; background: #161b22; color: inherit; text-decoration: none; display: flex; flex-direction: column; justify-content: flex-end; transition: .18s ease; }
    a:hover { transform: translateY(-3px); border-color: #8b949e; }
    strong { font-size: 1.35rem; }
    span { margin-top: 8px; color: #9ca7b5; }
    @media (max-width: 620px) { .games { grid-template-columns: 1fr; } a { min-height: 150px; } }
  </style>
</head>
<body>
  <main>
    <h1>Choromi Servers</h1>
    <p>게임 서버 안내 페이지를 선택하세요.</p>
    <div class="games">
      <a href="/games/Valheim/"><strong>Valheim</strong><span>Dedicated server guide</span></a>
      <a href="/games/zomboid/"><strong>Project Zomboid</strong><span>Co-op survival campaign</span></a>
    </div>
  </main>
</body>
</html>
